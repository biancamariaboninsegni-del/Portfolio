<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bianca Maria Boninsegni | Sovereign Archive</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Inter:wght@200;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-paper: #F4F1EA;
            --text-dark: #2F2F2F;
            --accent-green: #2D4F3E; /* iMac Green */
        }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: 'Inter', sans-serif; }
        
        /* Splash Screen - Henry Heffernan Style */
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; color: #fff; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 100;
            transition: opacity 1.5s ease;
        }
        .border-box { border: 1px solid #fff; padding: 40px; max-width: 600px; text-align: center; }
        .quote { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 1.1rem; line-height: 1.6; margin-bottom: 40px; color: #ccc; }
        #start-btn { background: none; border: 1px solid #fff; color: #fff; padding: 10px 30px; cursor: pointer; letter-spacing: 2px; transition: 0.3s; }
        #start-btn:hover { background: #fff; color: #000; }

        /* Studio Atmosphere */
        #studio-container {
            opacity: 0; width: 100%; height: 100%; background: var(--bg-paper);
            transition: opacity 2s ease; position: relative;
        }

        .interactive-object {
            position: absolute; cursor: pointer; transition: transform 0.3s;
            font-family: 'Cormorant Garamond', serif; font-size: 1.2rem;
        }
        .interactive-object:hover { transform: scale(1.05); color: var(--accent-green); }

        /* Dossier Modals */
        .modal {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 85%; max-width: 750px; background: white; padding: 50px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.15); z-index: 200;
            font-family: 'Cormorant Garamond', serif; border-radius: 2px;
        }
        .modal h2 { border-bottom: 1px solid #eaeaea; padding-bottom: 15px; font-weight: 300; letter-spacing: 1px; }
        .modal-content { font-size: 1.1rem; line-height: 1.7; color: var(--text-dark); margin-top: 20px; }
        .modal-close { position: absolute; top: 25px; right: 25px; cursor: pointer; font-family: 'Inter'; font-size: 0.8rem; }
    </style>
</head>
